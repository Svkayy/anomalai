name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Staged install — a single `pip install -r requirements.txt` fails in a
      # clean env due to: resolution-too-deep from unbounded langchain pins,
      # numpy>=2 breaking the opencv ABI, and httpx version conflicts with
      # supabase. Each stage resolves independently; the final re-pin line
      # restores numpy<2 and httpx<0.26 that opencv and supabase both need.
      - name: Install deps (staged to avoid resolution conflicts)
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.24.3 Pillow==10.0.1 opencv-python==4.8.1.78 psutil==5.9.6 pytesseract==0.3.10 python-dotenv==1.0.0 requests Flask==2.3.3 pytest
          pip install torch
          pip install transformers==4.35.0 coremltools
          pip install 'git+https://github.com/openai/CLIP.git'
          pip install google-generativeai==0.3.2
          pip install 'supabase==2.3.4' psycopg2-binary==2.9.7 'httpx>=0.24,<0.26'
          pip install fastapi==0.104.1 uvicorn==0.24.0
          pip install langchain-core langchain-community langchain-ollama
          pip install 'numpy==1.24.3' 'httpx>=0.24,<0.26'

      - name: Run non-smoke tests
        run: python -m pytest -m "not smoke" -q
